spring:
  application:
    name: ymmo-api

  datasource:
    url: jdbc:postgresql://localhost:5432/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

server:
  port: 8080

jwt:
  secret: 123456789012345678901234567890123456789012345678901
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
