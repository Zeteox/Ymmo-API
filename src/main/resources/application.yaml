spring:
  application:
    name: ymmo-api

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

logging:
  level:
    root: INFO
    fr.loic_delprat.ymmo_api: DEBUG
    org.springframework.web: DEBUG

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:123456789012345678901234567890123456789012345678901}
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
